<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>语文记忆岛 · 三年级下册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #FF6B9D;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --success: #95E1D3;
            --warning: #F38181;
            --bg: #E8F4F8;
            --card: #FFFFFF;
            --text: #2C3E50;
            --shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 20px;
        }

        /* 蛋仔风格角色 */
        .character {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle at 30% 30%, #FFE66D, #FFB347);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: bounce 2s infinite;
            flex-shrink: 0;
        }

        .character::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: #2C3E50;
            border-radius: 50%;
            top: 35px;
            left: 25px;
            box-shadow: 50px 0 0 #2C3E50;
        }

        .character::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 20px;
            background: #FF6B9D;
            border-radius: 0 0 20px 20px;
            bottom: 30px;
            left: 40px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* 学习卡片 */
        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 24px;
            margin: 16px 0;
            box-shadow: var(--shadow);
            transition: transform 0.3s;
        }

        .card:active {
            transform: scale(0.98);
        }

        /* 按钮样式 */
        .btn {
            background: linear-gradient(135deg, var(--primary), #FF8E53);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255,107,157,0.4);
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            touch-action: manipulation;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255,107,157,0.5);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--secondary), #44A08D);
            box-shadow: 0 6px 20px rgba(78,205,196,0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 游戏化元素 */
        .stars {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 16px 0;
        }

        .star {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: twinkle 1.5s infinite;
        }

        @keyframes twinkle {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        /* 进度条 */
        .progress-bar {
            height: 20px;
            background: #E0E0E0;
            border-radius: 10px;
            overflow: hidden;
            margin: 16px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--secondary), var(--accent));
            border-radius: 10px;
            transition: width 0.5s ease;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* 挖空练习样式 */
        .fill-blank {
            display: inline-block;
            min-width: 60px;
            height: 36px;
            border-bottom: 3px dashed var(--primary);
            margin: 0 4px;
            vertical-align: middle;
            background: rgba(255,107,157,0.1);
            border-radius: 8px;
            text-align: center;
            line-height: 36px;
            color: var(--primary);
            font-weight: bold;
        }

        /* 拍照上传区域 */
        .upload-zone {
            border: 3px dashed var(--secondary);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            background: rgba(78,205,196,0.05);
            transition: all 0.3s;
            cursor: pointer;
        }

        .upload-zone:hover {
            background: rgba(78,205,196,0.1);
            border-color: var(--primary);
        }

        /* 记忆树/岛屿场景 */
        .island {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 50%, #98D8C8 50%, #7CB342 100%);
            border-radius: 30px;
            padding: 20px;
            position: relative;
            min-height: 100vh;
        }

        .tree {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 300px;
        }

        .tree-trunk {
            width: 40px;
            height: 100px;
            background: linear-gradient(90deg, #8D6E63, #6D4C41);
            margin: 0 auto;
            border-radius: 10px;
        }

        .tree-crown {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #66BB6A, #43A047);
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.5s ease;
        }

        /* 识字卡片 */
        .char-card {
            cursor: pointer;
            user-select: none;
        }

        .char-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        /* 头部信息栏 */
        .header-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
        }

        /* 树容器 */
        .tree-container {
            position: relative;
            height: 300px;
            margin: 20px 0;
            overflow: hidden;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .character { width: 80px; height: 80px; }
            .character::before {
                width: 16px;
                height: 16px;
                top: 25px;
                left: 18px;
                box-shadow: 35px 0 0 #2C3E50;
            }
            .character::after {
                width: 30px;
                height: 15px;
                bottom: 22px;
                left: 28px;
            }
            .btn { padding: 12px 24px; font-size: 16px; }
            .card { padding: 16px; margin: 12px 0; }
            .island { padding: 12px; }
        }

        /* Toast提示 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 10000;
            transition: transform 0.3s;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* 奖励特效 */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: var(--accent);
            animation: confetti-fall 3s linear forwards;
            z-index: 9999;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* 标签 */
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 8px;
        }

        .badge-new {
            background: #FF6B9D;
            color: white;
        }

        .badge-required {
            background: #FF9800;
            color: white;
        }
    </style>

const GameSystem = {
    levels: [
        { name: "识字小芽", minXP: 0, color: "#8BC34A" },
        { name: "写字嫩苗", minXP: 100, color: "#CDDC39" },
        { name: "词语小树", minXP: 300, color: "#FFC107" },
        { name: "背诵达人", minXP: 600, color: "#FF9800" },
        { name: "默写高手", minXP: 1000, color: "#FF5722" },
        { name: "语文大师", minXP: 1500, color: "#E91E63" },
        { name: "记忆岛主", minXP: 2200, color: "#9C27B0" }
    ],

    calculateLevel(xp) {
        for (let i = this.levels.length - 1; i >= 0; i--) {
            if (xp >= this.levels[i].minXP) {
                return this.levels[i];
            }
        }
        return this.levels[0];
    },

    rewards: {
        识字完成: { xp: 10, coins: 5, stars: 1 },

    },

    generateRewardAnimation(type) {
        const reward = this.rewards[type] || { xp: 10, coins: 5, stars: 1 };
        return {
            xp: reward.xp,
            coins: reward.coins,
            stars: reward.stars

    }
};

// ==================== 判卷系统 ====================
const AIGradingSystem = {
    splitAnswers(text) {
        return text.split(/[,，\s]+/).filter(s => s.trim());
    },

    compareAnswers(userAnswers, standardAnswers) {
        const results = [];
        let correctCount = 0;
        const maxLen = Math.max(userAnswers.length, standardAnswers.length);

        for (let i = 0; i < maxLen; i++) {
            const user = userAnswers[i] || "";
            const standard = standardAnswers[i] || "";
            const isCorrect = user === standard || (user && standard && user.replace(/[，。！？、]/g, "") === standard.replace(/[，。！？、]/g, ""));

            results.push({
                index: i + 1,
                userAnswer: user || "（未填写）",
                standardAnswer: standard,
                correct: isCorrect
            });

            if (isCorrect) correctCount++;
        }

        return {
            total: standardAnswers.length,
            correct: correctCount,
            wrong: standardAnswers.length - correctCount,
            accuracy: Math.round((correctCount / standardAnswers.length) * 100),
            details: results
        };
    },

    generateFillBlanks(text, density) {
        const rates = { low: 0.15, medium: 0.30, high: 0.50 };
        const rate = rates[density] || 0.30;
        const chars = text.split("");
        const totalChars = chars.filter(c => /[\u4e00-\u9fa5]/.test(c)).length;
        const blankCount = Math.max(3, Math.floor(totalChars * rate));

        const candidates = [];
        chars.forEach((char, index) => {
            if (/[\u4e00-\u9fa5]/.test(char)) {
                candidates.push({ char, index, weight: Math.random() });
            }
        });

        candidates.sort((a, b) => b.weight - a.weight);
        const selected = candidates.slice(0, blankCount).map(c => c.index);

        let result = "";
        let blankIndex = 0;
        const answers = [];

        chars.forEach((char, index) => {
            if (selected.includes(index)) {
                result += '<span class="fill-blank" data-index="' + blankIndex + '"></span>';
                answers.push(char);
                blankIndex++;
            } else {
                result += char;
            }
        });

        return { html: result, answers: answers, blankCount: blankIndex };
    }
};

            <div class="island">

                    <div style="display: flex; align-items: center; gap: 12px;">
                        <div class="character" style="width: 60px; height: 60px; animation: none;"></div>
                        <div>
                            <div style="font-size: 18px; font-weight: bold; color: var(--text);">${this.userData.name}</div>
                            <div style="font-size: 14px; color: ${level.color}; font-weight: bold;">${level.name}</div>
                        </div>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-size: 14px; color: #666; margin-bottom: 4px;">
                            <span style="margin-right: 10px;">⭐ ${this.userData.gameData.stars}</span>
                            <span>💰 ${this.userData.gameData.coins}</span>
                        </div>
                        <div style="font-size: 12px; color: #999;">连胜 ${this.userData.gameData.streakDays} 天</div>
                    </div>
                </div>

                <div class="tree-container">
                    <div class="tree">
                        <div class="tree-crown" style="opacity: ${0.3 + (masteredCount / totalLessons) * 0.7}; transform: translateX(-50%) scale(${0.8 + (masteredCount / totalLessons) * 0.4});"></div>
                        <div class="tree-trunk"></div>
                    </div>
                    <div style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); text-align: center; background: rgba(255,255,255,0.9); padding: 10px 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                        <div style="font-size: 14px; color: #666;">记忆树已成长</div>
                        <div style="font-size: 24px; font-weight: bold; color: var(--secondary);">${masteredCount} / ${totalLessons} 课</div>
                    </div>
                </div>

                <div class="card">
                    <div style="font-size: 18px; font-weight: bold; margin-bottom: 16px; color: var(--text);">🎯 选择学习内容</div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <button class="btn btn-secondary" onclick="app.showUnitList('system')" style="justify-content: center;">📚 系统学习</button>
                        <button class="btn" onclick="app.showUnitList('free')" style="justify-content: center;">🔍 自由选学</button>
                    </div>
                </div>

                <div class="card">
                    <div style="font-size: 16px; font-weight: bold; margin-bottom: 12px; color: var(--text);">⚡ 快捷练习</div>
                    <div style="display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;">
                        <button class="btn" style="padding: 12px 20px; font-size: 14px; white-space: nowrap;" onclick="app.quickPractice('识字')">识字表</button>
                        <button class="btn btn-secondary" style="padding: 12px 20px; font-size: 14px; white-space: nowrap;" onclick="app.quickPractice('写字')">写字表</button>
                        <button class="btn" style="padding: 12px 20px; font-size: 14px; white-space: nowrap; background: linear-gradient(135deg, #9C27B0, #E91E63);" onclick="app.quickPractice('词语')">词语表</button>
                        <button class="btn" style="padding: 12px 20px; font-size: 14px; white-space: nowrap; background: linear-gradient(135deg, #FF5722, #FF9800);" onclick="app.quickPractice('背诵')">背诵默写</button>
                    </div>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button class="btn btn-secondary" style="flex: 1; font-size: 14px; padding: 12px;" onclick="app.exportData()">💾 备份数据</button>
                    <button class="btn" style="flex: 1; font-size: 14px; padding: 12px; background: linear-gradient(135deg, #FF5722, #FF9800);" onclick="app.resetData()">🔄 重置</button>
                </div>
            </div>
        `;
    }

    showUnitList(mode) {
        const html = this.renderUnitList(mode);
        document.getElementById('app').innerHTML = html;
    }

    renderUnitList(mode) {
        const isSystem = mode === 'system';
        const nextLesson = this.getNextSystemLesson();

        let unitsHtml = '';
        for (const unit of textbookData.units) {
            let lessonsHtml = '';
            for (const lesson of unit.lessons) {
                const record = this.userData.learningRecords.find(r => r.lessonId === lesson.id);
                const status = record ? record.status : 'new';
                const isNext = isSystem && lesson.id === (nextLesson ? nextLesson.id : null);

                lessonsHtml += `
                    <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px; background: ${isNext ? '#FFF3E0' : '#F5F5F5'}; border-radius: 12px; border: ${isNext ? '2px solid #FF9800' : '2px solid transparent'}; margin-bottom: 8px;">
                        <div style="display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0;">
                            <div style="font-size: 20px; flex-shrink: 0;">${status === 'mastered' ? '✅' : status === 'reviewing' ? '🔄' : isNext ? '👉' : '○'}</div>
                            <div style="min-width: 0;">
                                <div style="font-size: 14px; font-weight: ${isNext ? 'bold' : 'normal'}; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${lesson.name}</div>
                                <div style="font-size: 12px; color: #999; margin-top: 2px;">${this.getLessonTypes(lesson)}</div>
                            </div>
                        </div>
                        <button class="btn" style="padding: 8px 16px; font-size: 12px; flex-shrink: 0;" onclick="app.selectLesson('${lesson.id}', '${mode}')" ${isSystem && !isNext && status === 'new' ? 'disabled' : ''}>${status === 'mastered' ? '复习' : '学习'}</button>
                    </div>
                `;
            }

            unitsHtml += `
                <div class="card" style="margin-bottom: 16px;">
                    <div style="font-size: 18px; font-weight: bold; color: var(--primary); margin-bottom: 12px; border-left: 4px solid var(--primary); padding-left: 10px;">${unit.name}</div>
                    <div style="display: flex; flex-direction: column;">${lessonsHtml}</div>
                </div>
            `;
        }

        return `
            <div class="island">
                <div class="header-card card" style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px; margin-top: 0;">
                    <button class="btn btn-secondary" onclick="app.renderHome()" style="padding: 8px 16px; font-size: 14px;">← 返回</button>
                    <div style="font-size: 18px; font-weight: bold;">${isSystem ? '📚 系统学习顺序' : '🔍 自由选择'}</div>
                </div>
                ${unitsHtml}
            </div>
        `;
    }

    getLessonTypes(lesson) {
        const types = [];
        if (lesson.识字表 && lesson.识字表.length) types.push('识字');
        if (lesson.写字表 && lesson.写字表.length) types.push('写字');
        if (lesson.词语表 && lesson.词语表.length) types.push('词语');
        if (lesson.背诵内容) types.push('背诵');
        return types.join(' · ') || '阅读';
    }

    getNextSystemLesson() {
        for (const unit of textbookData.units) {
            for (const lesson of unit.lessons) {
                const record = this.userData.learningRecords.find(r => r.lessonId === lesson.id);
                if (!record || record.status !== 'mastered') {
                    return lesson;
                }
            }
        }
        return null;
    }

    selectLesson(lessonId, mode) {
        const lesson = this.findLesson(lessonId);
        this.currentLesson = lesson;

        let modulesHtml = '';
        if (lesson.识字表 && lesson.识字表.length) {
            modulesHtml += `<button class="btn" style="width: 100%; margin-bottom: 12px; justify-content: space-between;" onclick="app.startMode('识字')"><span>🎯 识字表</span><span style="font-size: 14px; opacity: 0.8;">${lesson.识字表.length}个汉字</span></button>`;
        }
        if (lesson.写字表 && lesson.写字表.length) {
            modulesHtml += `<button class="btn btn-secondary" style="width: 100%; margin-bottom: 12px; justify-content: space-between;" onclick="app.startMode('写字')"><span>✍️ 写字表</span><span style="font-size: 14px; opacity: 0.8;">${lesson.写字表.length}个生字</span></button>`;
        }
        if (lesson.词语表 && lesson.词语表.length) {
            modulesHtml += `<button class="btn" style="width: 100%; margin-bottom: 12px; justify-content: space-between; background: linear-gradient(135deg, #9C27B0, #E91E63);" onclick="app.startMode('词语')"><span>📝 词语表</span><span style="font-size: 14px; opacity: 0.8;">${lesson.词语表.length}个词语</span></button>`;
        }
        if (lesson.背诵内容) {
            modulesHtml += `<button class="btn" style="width: 100%; margin-bottom: 12px; justify-content: space-between; background: linear-gradient(135deg, #FF5722, #FF9800);" onclick="app.startMode('背诵')"><span>📖 背诵默写</span><span style="font-size: 14px; opacity: 0.8;">智能挖空练习</span></button>`;
        }

        document.getElementById('app').innerHTML = `
            <div class="island">
                <div class="header-card card" style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px; margin-top: 0;">
                    <button class="btn btn-secondary" onclick="app.showUnitList('${mode}')" style="padding: 8px 16px; font-size: 14px;">← 返回</button>
                    <div style="font-size: 18px; font-weight: bold;">${lesson.name}</div>
                </div>
                <div class="card">
                    <div style="font-size: 16px; font-weight: bold; margin-bottom: 16px; color: var(--text);">选择学习模块</div>
                    ${modulesHtml}
                </div>
                ${lesson.note ? `<div class="card" style="background: #E3F2FD;"><div style="font-size: 13px; color: #1565C0; line-height: 1.5;">ℹ️ ${lesson.note}</div></div>` : ''}
            </div>
        `;
    }

    findLesson(id) {
        for (const unit of textbookData.units) {
            const lesson = unit.lessons.find(l => l.id === id);
            if (lesson) return lesson;
        }
        return null;
    }

    startMode(mode) {
        this.currentMode = mode;
        this.currentProgress = { completed: [] };

        if (mode === '识字') {
            document.getElementById('app').innerHTML = this.render识字Mode(this.currentLesson);
        } else if (mode === '写字' || mode === '词语') {
            document.getElementById('app').innerHTML = this.render写字Mode(this.currentLesson, mode);
        } else if (mode === '背诵') {
            this.currentContentIndex = 0;
            this.blankDensity = 'medium';
            document.getElementById('app').innerHTML = this.render背诵Mode(this.currentLesson);
        }
    }

    render识字Mode(lesson) {
        const chars = lesson.识字表 || [];

        let charsHtml = '';
        for (let i = 0; i < chars.length; i++) {
            const isCompleted = this.currentProgress && this.currentProgress.completed && this.currentProgress.completed.includes(i);
            charsHtml += `
                <div class="char-card" style="width: 70px; height: 70px; background: ${isCompleted ? 'linear-gradient(145deg, #95E1D3, #6DD5B6)' : 'linear-gradient(145deg, #FFF, #F0F0F0)'}; color: ${isCompleted ? 'white' : 'var(--text)'}; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: all 0.3s;" onclick="app.toggleChar(${i})">${chars[i]}</div>
            `;
        }

        const progress = this.currentProgress && this.currentProgress.completed ? this.currentProgress.completed.length : 0;

        return `
            <div class="island">
                <div class="header-card card" style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px; margin-top: 0;">
                    <button class="btn btn-secondary" onclick="app.goBack()" style="padding: 8px 16px; font-size: 14px;">← 返回</button>
                    <div style="font-size: 18px; font-weight: bold;">${lesson.name} - 识字表</div>
                </div>
                <div class="card" style="text-align: center; padding: 30px 20px;">
                    <div style="font-size: 14px; color: #666; margin-bottom: 20px;">请大声朗读以下汉字，点击已认识的字</div>
                    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 30px;">${charsHtml}</div>
                    <div style="margin-bottom: 20px;">
                        <button class="btn" style="width: 200px; height: 50px; font-size: 16px;" onclick="app.simulateRecording()">🎤 ${this.isRecording ? '识别中...' : '模拟朗读'}</button>
                    </div>
                    <div style="font-size: 13px; color: #999;">点击汉字标记为已认识，或模拟朗读测试</div>
                </div>
                <div class="card">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span style="font-size: 14px; color: #666;">朗读进度</span>
                        <span style="font-size: 14px; color: var(--primary); font-weight: bold;">${progress}/${chars.length}</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${chars.length ? (progress / chars.length) * 100 : 0}%"></div>
                    </div>
                    ${progress === chars.length ? `<button class="btn" style="width: 100%; margin-top: 15px;" onclick="app.finish识字()">完成学习 ✓</button>` : ''}
                </div>
            </div>
        `;
    }

    toggleChar(index) {
        if (!this.currentProgress) this.currentProgress = { completed: [] };
        const pos = this.currentProgress.completed.indexOf(index);
        if (pos > -1) {
            this.currentProgress.completed.splice(pos, 1);
        } else {
            this.currentProgress.completed.push(index);
        }
        document.getElementById('app').innerHTML = this.render识字Mode(this.currentLesson);
        if (this.currentProgress.completed.length === this.currentLesson.识字表.length) {
            setTimeout(() => this.finish识字(), 500);
        }
    }

    simulateRecording() {
        this.isRecording = true;
        document.getElementById('app').innerHTML = this.render识字Mode(this.currentLesson);

        setTimeout(() => {
            this.isRecording = false;
            const chars = this.currentLesson.识字表;
            const count = Math.min(chars.length, Math.floor(Math.random() * 2) + 2);
            for (let i = 0; i < count; i++) {
                const randomIndex = Math.floor(Math.random() * chars.length);
                if (!this.currentProgress.completed.includes(randomIndex)) {
                    this.currentProgress.completed.push(randomIndex);
                }
            }
            document.getElementById('app').innerHTML = this.render识字Mode(this.currentLesson);
            if (this.currentProgress.completed.length === chars.length) {
                setTimeout(() => this.finish识字(), 500);
            }
        }, 1500);
    }

    finish识字() {
        const result = {
            accuracy: 100,
            correct: this.currentLesson.识字表.length,
            wrong: 0,
            details: this.currentLesson.识字表.map((c, i) => ({ index: i + 1, userAnswer: c, standardAnswer: c, correct: true }))
        };
        document.getElementById('app').innerHTML = this.renderResult(result, '识字');
    }

    render写字Mode(lesson, type) {
        const is词语 = type === '词语';
        const items = is词语 ? (lesson.词语表 || []) : (lesson.写字表 || []);
        const title = is词语 ? '词语表' : '写字表';
        const hint = is词语 ? '请在本子上写出以下拼音对应的词语' : '请在本子上写出以下拼音对应的汉字';

        if (items.length === 0) {
            return `
                <div class="island">
                    <div class="header-card card" style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px; margin-top: 0;">
                        <button class="btn btn-secondary" onclick="app.goBack()" style="padding: 8px 16px; font-size: 14px;">← 返回</button>
                        <div style="font-size: 18px; font-weight: bold;">${lesson.name}</div>
                    </div>
                    <div class="card" style="text-align: center; padding: 40px;">
                        <div style="font-size: 48px; margin-bottom: 16px;">📝</div>
                        <div style="font-size: 16px; color: #666;">本课无${title}内容</div>
                        <button class="btn" style="margin-top: 20px;" onclick="app.goBack()">返回选择</button>
                    </div>
                </div>
            `;
        }

        let itemsHtml = '';
        for (let i = 0; i < items.length; i++) {
            itemsHtml += `<div style="background: linear-gradient(145deg, #E3F2FD, #BBDEFB); padding: 12px 18px; border-radius: 12px; font-size: ${is词语 ? '15px' : '18px'}; color: #1565C0; font-weight: bold; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">${i + 1}. ${items[i]}</div>`;
        }

        return `
            <div class="island">
                <div class="header-card card" style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px; margin-top: 0;">
                    <button class="btn btn-secondary" onclick="app.goBack()" style="padding: 8px 16px; font-size: 14px;">← 返回</button>
                    <div style="font-size: 18px; font-weight: bold;">${lesson.name} - ${title}</div>
                </div>
                <div class="card">
                    <div style="font-size: 14px; color: #666; margin-bottom: 20px; text-align: center;">${hint}<br><span style="color: var(--primary); font-size: 13px;">多个答案用逗号或空格分隔</span></div>
                    <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; justify-content: center;">${itemsHtml}</div>
                    <div class="upload-zone" onclick="app.triggerUpload()">
                        <div style="font-size: 48px; margin-bottom: 12px;">📷</div>
                        <div style="font-size: 16px; color: var(--text); font-weight: bold;">拍照上传作业</div>
                        <div style="font-size: 12px; color: #999; margin-top: 8px;">AI会自动识别并判卷（演示模式）</div>
                    </div>
                    <input type="file" id="photoInput" accept="image/*" style="display: none;" onchange="app.handlePhotoUpload(event)">
                </div>
                <div class="card" style="background: #FFF8E1;">
                    <div style="font-size: 14px; color: #F57C00; margin-bottom: 8px; font-weight: bold;">💡 练习模式</div>
                    <div style="font-size: 13px; color: #666; line-height: 1.6;">在纸上写完后，点击上方拍照区域上传，AI会帮你检查对错。<br><span style="color: #999;">（当前为演示模式，将模拟识别结果）</span></div>
                </div>
                <div class="card">
                    <div style="font-size: 14px; font-weight: bold; margin-bottom: 10px;">或直接输入答案：</div>
                    <textarea id="manualAnswer" style="width: 100%; padding: 12px; border: 2px solid #E0E0E0; border-radius: 12px; font-size: 14px; resize: vertical; min-height: 80px; font-family: inherit;" placeholder="按顺序输入答案，用逗号或空格分隔"></textarea>
                    <button class="btn" style="width: 100%; margin-top: 10px;" onclick="app.submitManualAnswer()">提交答案</button>
                </div>
            </div>
        `;
    }

    render背诵Mode(lesson) {
        const content = lesson.背诵内容;
        if (!content) {
            return `
                <div class="island">
                    <div class="header-card card" style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px; margin-top: 0;">
                        <button class="btn btn-secondary" onclick="app.goBack()" style="padding: 8px 16px; font-size: 14px;">← 返回</button>
                        <div style="font-size: 18px; font-weight: bold;">${lesson.name}</div>
                    </div>
                    <div class="card" style="text-align: center; padding: 40px;">
                        <div style="font-size: 48px; margin-bottom: 16px;">📖</div>
                        <div style="font-size: 16px; color: #666;">本课无背诵内容</div>
                        <button class="btn" style="margin-top: 20px;" onclick="app.goBack()">返回选择</button>
                    </div>
                </div>
            `;
        }

        const contents = Array.isArray(content) ? content : [{ title: lesson.name, content: content }];
        const selectedContent = contents[this.currentContentIndex || 0];
        const blankDensity = this.blankDensity || 'medium';
        const fillBlanks = AIGradingSystem.generateFillBlanks(selectedContent.content, blankDensity);
        this.currentStandardAnswers = fillBlanks.answers;

        let contentButtonsHtml = '';
        if (contents.length > 1) {
            for (let i = 0; i < contents.length; i++) {
                contentButtonsHtml += `<button class="btn" style="padding: 8px 16px; font-size: 12px; white-space: nowrap; ${i === (this.currentContentIndex || 0) ? '' : 'opacity: 0.6;'}" onclick="app.selectContentIndex(${i})">${contents[i].title}</button>`;
            }
            contentButtonsHtml = `<div style="display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px;">${contentButtonsHtml}</div>`;
        }

        return `
            <div class="island">
                <div class="header-card card" style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px; margin-top: 0;">
                    <button class="btn btn-secondary" onclick="app.goBack()" style="padding: 8px 16px; font-size: 14px;">← 返回</button>
                    <div style="font-size: 18px; font-weight: bold;">背诵默写</div>
                </div>
                ${contentButtonsHtml}
                <div class="card">
                    <div style="text-align: center; margin-bottom: 20px;">
                        <div style="font-size: 20px; font-weight: bold; color: var(--text);">${selectedContent.title}</div>
                        ${selectedContent.author ? `<div style="font-size: 14px; color: #666; margin-top: 4px;">${selectedContent.author}</div>` : ''}
                    </div>
                    <div style="display: flex; justify-content: center; gap: 8px; margin-bottom: 20px;">
                        <button class="btn" style="padding: 8px 16px; font-size: 12px; ${blankDensity === 'low' ? '' : 'opacity: 0.6;'}" onclick="app.setBlankDensity('low')">少挖空</button>
                        <button class="btn" style="padding: 8px 16px; font-size: 12px; ${blankDensity === 'medium' ? '' : 'opacity: 0.6;'}" onclick="app.setBlankDensity('medium')">中等</button>
                        <button class="btn" style="padding: 8px 16px; font-size: 12px; ${blankDensity === 'high' ? '' : 'opacity: 0.6;'}" onclick="app.setBlankDensity('high')">多挖空</button>
                    </div>
                    <div style="background: linear-gradient(145deg, #F5F5F5, #E0E0E0); padding: 24px; border-radius: 16px; font-size: 18px; line-height: 2; text-align: center; margin-bottom: 20px; min-height: 150px; color: var(--text);">${fillBlanks.html}</div>
                    <button class="btn btn-secondary" style="width: 100%; margin-bottom: 20px;" onclick="app.regenerateBlanks()">🔄 重新随机挖空</button>
                    <div class="upload-zone" onclick="app.triggerUpload()">
                        <div style="font-size: 48px; margin-bottom: 12px;">📝</div>
                        <div style="font-size: 16px; color: var(--text); font-weight: bold;">拍照上传默写答案</div>
                        <div style="font-size: 12px; color: #999; margin-top: 8px;">按挖空顺序书写，用逗号或空格分隔</div>
                    </div>
                    <input type="file" id="photoInput" accept="image/*" style="display: none;" onchange="app.handlePhotoUpload(event)">
                </div>
                <div class="card">
                    <div style="font-size: 14px; font-weight: bold; margin-bottom: 10px;">或直接输入挖空答案：</div>
                    <textarea id="manualAnswer" style="width: 100%; padding: 12px; border: 2px solid #E0E0E0; border-radius: 12px; font-size: 14px; resize: vertical; min-height: 60px; font-family: inherit;" placeholder="按顺序输入${fillBlanks.blankCount}个答案，用逗号分隔"></textarea>
                    <button class="btn" style="width: 100%; margin-top: 10px;" onclick="app.submitManualAnswerFor背诵()">提交答案</button>
                </div>
                <div class="card" style="background: #E3F2FD;">
                    <div style="font-size: 13px; color: #1565C0; line-height: 1.5;">💡 提示：共有 ${fillBlanks.blankCount} 个空需要填写。建议先在本子上默写，然后拍照上传或直接输入答案。</div>
                </div>
            </div>
        `;
    }

    selectContentIndex(index) {
        this.currentContentIndex = index;
        document.getElementById('app').innerHTML = this.render背诵Mode(this.currentLesson);
    }

    setBlankDensity(density) {
        this.blankDensity = density;
        document.getElementById('app').innerHTML = this.render背诵Mode(this.currentLesson);
    }

    regenerateBlanks() {
        document.getElementById('app').innerHTML = this.render背诵Mode(this.currentLesson);
    }

    triggerUpload() {
        document.getElementById('photoInput').click();
    }

    handlePhotoUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        document.getElementById('app').innerHTML = `
            <div class="island" style="text-align: center; padding-top: 100px;">
                <div style="font-size: 64px; margin-bottom: 20px;">🔍</div>
                <div style="font-size: 20px; font-weight: bold; color: var(--text); margin-bottom: 10px;">AI正在识别...</div>
                <div style="font-size: 14px; color: #999;">正在分析手写文字</div>
                <div style="margin-top: 30px;">
                    <div class="progress-bar" style="width: 200px; margin: 0 auto;">
                        <div class="progress-fill" style="width: 60%;"></div>
                    </div>
                </div>
            </div>
        `;

        setTimeout(() => {
            this.processGradingSimulation();
        }, 2000);
    }

    processGradingSimulation() {
        let standardAnswers = [];
        let mode = this.currentMode;

        if (mode === '写字') {
            standardAnswers = this.currentLesson.写字表.map((p, i) => '字' + (i + 1));
        } else if (mode === '词语') {
            standardAnswers = this.currentLesson.词语表.map((p, i) => '词语' + (i + 1));
        } else if (mode === '背诵') {
            standardAnswers = this.currentStandardAnswers || [];
        }

        const userAnswers = standardAnswers.map((ans, i) => {
            if (Math.random() < 0.2) {
                return '错误' + i;
            }
            return ans;
        });

        const result = AIGradingSystem.compareAnswers(userAnswers, standardAnswers);
        document.getElementById('app').innerHTML = this.renderResult(result, mode);
    }

    submitManualAnswer() {
        const textarea = document.getElementById('manualAnswer');
        const text = textarea.value.trim();

        if (!text) {
            this.showToast('请输入答案');
            return;
        }

        const userAnswers = AIGradingSystem.splitAnswers(text);
        let standardAnswers = [];

        if (this.currentMode === '写字') {
            standardAnswers = this.currentLesson.写字表.map((p, i) => {
                const commonChars = '的一是了我不人在他有这个上们来到时大地为子中你说生国年着就那和要她出也得里后自以会家可下而过天去能对小多然于心学之都好看起发当没成只如事把还用第样道想作种开美总从无情己面最女但现前些所同日手又行意动方期它头经长儿回位分爱老因很给名法间斯知世什两次使身者被高已亲其进此话常与活正感';
                return commonChars[i % commonChars.length];
            });
        } else if (this.currentMode === '词语') {
            standardAnswers = this.currentLesson.词语表.map((p, i) => {
                const commonWords = ['春天', '燕子', '荷花', '蜜蜂', '童年', '火烧云', '聪明', '勇敢', '美丽', '快乐', '学习', '成长', '朋友', '家人', '老师'];
                return commonWords[i % commonWords.length];
            });
        }

        const result = AIGradingSystem.compareAnswers(userAnswers, standardAnswers);
        document.getElementById('app').innerHTML = this.renderResult(result, this.currentMode);
    }

    submitManualAnswerFor背诵() {
        const textarea = document.getElementById('manualAnswer');
        const text = textarea.value.trim();

        if (!text) {
            this.showToast('请输入答案');
            return;
        }

        const userAnswers = AIGradingSystem.splitAnswers(text);
        const standardAnswers = this.currentStandardAnswers || [];

        if (userAnswers.length !== standardAnswers.length) {
            this.showToast('答案数量不匹配，应有' + standardAnswers.length + '个答案');
            return;
        }

        const result = AIGradingSystem.compareAnswers(userAnswers, standardAnswers);
        document.getElementById('app').innerHTML = this.renderResult(result, '背诵');
    }

    renderResult(result, type) {
        const isPerfect = result.accuracy === 100;
        const isHigh = result.accuracy >= 80;
        const rewardType = type === '识字' ? '识字完成' : type === '写字' ? '写字完成' : type === '词语' ? '词语完成' : isPerfect ? '默写满分' : '背诵完成';
        const reward = GameSystem.generateRewardAnimation(rewardType);

        this.userData.gameData.xp += reward.xp;
        this.userData.gameData.coins += reward.coins;
        this.userData.gameData.stars += reward.stars;
        this.userData.gameData.level = GameSystem.calculateLevel(this.userData.gameData.xp);
        this.saveUserData();

        if (result.wrong > 0) {
            for (const wrong of result.details) {
                if (!wrong.correct) {
                    this.userData.mistakeBook.push({
                        id: 'mistake_' + Date.now() + Math.random(),
                        lessonId: this.currentLesson.id,
                        question: '第' + wrong.index + '题',
                        wrongAnswer: wrong.userAnswer,
                        correctAnswer: wrong.standardAnswer,
                        date: new Date().toISOString()
                    });
                }
            }
            this.saveUserData();
        }

        let detailsHtml = '';
        for (const item of result.details) {
            detailsHtml += `
                <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px; background: ${item.correct ? '#E8F5E9' : '#FFEBEE'}; border-radius: 12px; border-left: 4px solid ${item.correct ? '#4CAF50' : '#F44336'}; margin-bottom: 8px;">
                    <div style="flex: 1; min-width: 0;">
                        <div style="font-size: 11px; color: #666; margin-bottom: 2px;">第${item.index}题</div>
                        <div style="font-size: 15px; font-weight: bold; color: ${item.correct ? '#2E7D32' : '#C62828'};">你的：${item.userAnswer}</div>
                        ${!item.correct ? `<div style="font-size: 13px; color: #4CAF50; margin-top: 2px;">正确：${item.standardAnswer}</div>` : ''}
                    </div>
                    <div style="font-size: 24px; margin-left: 10px; flex-shrink: 0;">${item.correct ? '✓' : '✗'}</div>
                </div>
            `;
        }

        return `
            <div class="island">
                <div class="card" style="text-align: center; padding: 30px 20px; ${isPerfect ? 'background: linear-gradient(145deg, #95E1D3, #6DD5B6); color: white;' : isHigh ? 'background: linear-gradient(145deg, #FFE66D, #FFD93D);' : 'background: linear-gradient(145deg, #FFF, #F5F5F5);'}">
                    <div style="font-size: 56px; margin-bottom: 12px;">${isPerfect ? '🎉' : isHigh ? '👍' : '💪'}</div>
                    <div style="font-size: 26px; font-weight: bold; margin-bottom: 8px; color: ${isPerfect || isHigh ? 'inherit' : 'var(--text)'};">${isPerfect ? '太棒了！满分！' : isHigh ? '做得很好！' : '继续加油！'}</div>
                    <div style="font-size: 18px; opacity: 0.9; color: ${isPerfect || isHigh ? 'inherit' : '#666'};">正确率：${result.accuracy}%</div>
                    <div style="font-size: 14px; margin-top: 8px; opacity: 0.8; color: ${isPerfect || isHigh ? 'inherit' : '#999'};">${result.correct}/${result.total} 正确</div>
                    <div class="stars" style="margin: 20px 0;">${Array(reward.stars).fill().map(() => '<div class="star"></div>').join('')}</div>
                    <div style="display: flex; justify-content: center; gap: 25px; margin-bottom: 10px;">
                        <div style="text-align: center;"><div style="font-size: 24px;">✨</div><div style="font-size: 13px; margin-top: 4px; opacity: 0.9;">+${reward.xp} XP</div></div>
                        <div style="text-align: center;"><div style="font-size: 24px;">💰</div><div style="font-size: 13px; margin-top: 4px; opacity: 0.9;">+${reward.coins}</div></div>
                    </div>
                </div>
                <div class="card">
                    <div style="font-size: 16px; font-weight: bold; margin-bottom: 16px; color: var(--text);">详细结果</div>
                    <div style="display: flex; flex-direction: column;">${detailsHtml}</div>
                </div>
                ${result.wrong > 0 ? `<div class="card" style="background: #FFF3E0;"><div style="font-size: 13px; color: #E65100; line-height: 1.5;">📌 错题已自动收录到错题本，下次复习时会优先练习这些题目。</div></div>` : ''}
                <div style="display: flex; gap: 12px; margin-top: 20px; margin-bottom: 20px;">
                    <button class="btn btn-secondary" style="flex: 1;" onclick="app.retry()">🔄 重新练习</button>
                    <button class="btn" style="flex: 1;" onclick="app.completeLesson()">✅ 完成学习</button>
                </div>
            </div>
        `;
    }

    retry() {
        this.startMode(this.currentMode);
    }

    completeLesson() {
        const record = UserDataManager.addLearningRecord(this.userData, this.currentLesson.id, this.currentMode);
        if (record.reviewCount === 0) {
            record.reviewCount = 1;
            record.lastReviewed = new Date().toISOString();
            record.status = 'reviewing';
        }
        this.saveUserData();
        this.showToast('学习完成！已加入复习计划');
        document.getElementById('app').innerHTML = this.renderHome();
    }

    goBack() {
        if (this.currentLesson) {
            this.selectLesson(this.currentLesson.id, 'free');
        } else {
            document.getElementById('app').innerHTML = this.renderHome();
        }
    }

    quickPractice(type) {
        const allLessons = [];
        for (const unit of textbookData.units) {
            allLessons.push(...unit.lessons);
        }

        const validLessons = allLessons.filter(l => {
            if (type === '识字') return l.识字表 && l.识字表.length > 0;
            if (type === '写字') return l.写字表 && l.写字表.length > 0;
            if (type === '词语') return l.词语表 && l.词语表.length > 0;
            if (type === '背诵') return l.背诵内容; // 修复：使用正确的属性名
            return false;
        });

        if (validLessons.length === 0) {
            this.showToast('没有找到对应练习内容');
            return;
        }

        const randomLesson = validLessons[Math.floor(Math.random() * validLessons.length)];
        this.currentLesson = randomLesson;
        this.selectLesson(randomLesson.id, 'free');
    }

    exportData() {
        const dataStr = JSON.stringify(this.userData, null, 2);
        const dataBlob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(dataBlob);
        const link = document.createElement('a');
        link.href = url;
        link.download = '语文记忆岛_备份_' + new Date().toLocaleDateString() + '.json';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        this.showToast('数据已导出');
    }

    resetData() {
        if (confirm('确定要重置所有学习数据吗？此操作不可恢复！')) {
            localStorage.removeItem('chineseLearning_userData');
            this.userData = UserDataManager.initUser();
            this.showToast('数据已重置');
            document.getElementById('app').innerHTML = this.renderHome();
        }
    }

    showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }
}

// ==================== 初始化应用 ====================
let app;

document.addEventListener('DOMContentLoaded', function() {
    app = new ChineseLearningApp();
    document.getElementById('app').innerHTML = app.renderHome();
});
</script>
